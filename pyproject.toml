[tool.ruff]
target-version = "py311"
line-length = 100

[tool.ruff.lint]
select = ["E", "W", "F", "I", "B", "C4", "UP"]
ignore = ["E501", "ANN", "D", "B008", "F841", "B904", "E402"]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["S"]
"tools/*" = ["T20"]

[tool.mypy]
python_version = "3.11"
ignore_missing_imports = true
warn_return_any = false
strict = false

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
addopts = "--tb=short"
pythonpath = ["."]
markers = [
    "real_opus_verify: skip the auto_mock_opus_verify autouse fixture so the real _opus_verify implementation is used",
]
